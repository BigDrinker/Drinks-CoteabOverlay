name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import sys; print(sys.version)"
          python -c "import webview, qtpy; from PySide6 import QtCore, QtWebEngineWidgets; print('Qt dependencies OK')"

      - name: Build Windows application
        shell: powershell
        run: |
          python -m PyInstaller --noconfirm --clean CoteabMacro.spec

      - name: Create release ZIP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path 'dist\Coteab Macro\*' -DestinationPath 'release\Coteab-Macro-Overlay-v2.2.1-Windows.zip' -Force

      - name: Upload downloadable build
        uses: actions/upload-artifact@v4
        with:
          name: Coteab-Macro-Overlay-v2.2.1-Windows
          path: release/Coteab-Macro-Overlay-v2.2.1-Windows.zip
          if-no-files-found: error

      - name: Attach ZIP to tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Coteab-Macro-Overlay-v2.2.1-Windows.zip
          generate_release_notes: true
